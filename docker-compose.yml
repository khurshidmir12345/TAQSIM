services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: nonvoyxona-app
    restart: unless-stopped
    volumes:
      - .:/var/www
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - nonvoyxona

  nginx:
    image: nginx:alpine
    container_name: nonvoyxona-nginx
    restart: unless-stopped
    ports:
      - "8086:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - nonvoyxona

  mysql:
    image: mysql:8.0
    container_name: nonvoyxona-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nonvoyxona
      MYSQL_USER: nonvoyxona
      MYSQL_PASSWORD: secret
    volumes:
      - nonvoyxona-mysql:/var/lib/mysql
    ports:
      - "3311:3306"
    networks:
      - nonvoyxona
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 3

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: nonvoyxona-phpmyadmin
    restart: unless-stopped
    ports:
      - "8087:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - nonvoyxona

networks:
  nonvoyxona:
    driver: bridge

volumes:
  nonvoyxona-mysql:
    driver: local
